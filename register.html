<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — GW Training Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <div class="brand-logo"><i class="bi bi-mortarboard-fill"></i></div>
      <span>GW Training</span>
    </a>
    <div class="ms-auto d-flex gap-2">
      <button class="btn-navbar-icon dark-mode-toggle"><i class="bi bi-moon-stars-fill"></i></button>
    </div>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><i class="bi bi-person-plus-fill"></i></div>
      <h2 class="auth-title">Create Your Account</h2>
      <p class="auth-subtitle">Start your Google Workspace journey today — completely free.</p>
    </div>

    <div id="regError" class="alert alert-danger py-2 d-none" style="font-size:0.875rem;border-radius:var(--border-radius-sm)"></div>

    <div class="alert alert-info py-2" style="font-size:0.85rem;border-radius:var(--border-radius-sm)">
      <i class="bi bi-shield-check me-1"></i>
      Account creation is handled via <strong>Google Sign-In</strong> only.
    </div>

    <div class="mb-2 text-center">
      <div id="googleSignInBtn" class="d-flex justify-content-center"></div>
      <div id="googleSignInHint" class="mt-2" style="font-size:0.75rem;color:var(--text-muted);"></div>
    </div>

    <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);margin-top:1.25rem">
      Already have an account? <a href="login.html" style="color:var(--google-blue);font-weight:600">Sign in here</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="js/env.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/progress.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    Auth.redirectIfLoggedIn('dashboard.html');

    const gsRes = Auth.initGoogleSignIn({
      containerId: 'googleSignInBtn',
      autoPrompt: false,
      onSuccess: (result) => {
        Toast.show(`Welcome, ${result.user.name}!`, 'success', 1800);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      },
      onError: (err) => {
        showErr(document.getElementById('regError'), err.msg || 'Google sign-in failed.');
      }
    });

    if (!gsRes.ok) {
      const hint = document.getElementById('googleSignInHint');
      if (hint) hint.textContent = gsRes.msg;
    }
  });

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.remove('d-none');
  }
</script>
</body>
</html>
