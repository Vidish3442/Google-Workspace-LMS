<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — GW Training Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <div class="brand-logo"><i class="bi bi-mortarboard-fill"></i></div>
      <span>GW Training</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <a href="courses.html" class="btn-navbar-icon" style="font-size:0.8rem">
        <i class="bi bi-arrow-left me-1"></i><span class="d-none d-md-inline">Back</span>
      </a>
      <button class="btn-navbar-icon dark-mode-toggle" title="Toggle dark mode"><i class="bi bi-moon-stars-fill"></i></button>
      <div id="nav-login-btn">
        <a href="login.html" class="btn-primary-gw" style="padding:0.4rem 1rem;font-size:0.85rem">
          <i class="bi bi-person me-1"></i>Login
        </a>
      </div>
      <div id="nav-user-menu" class="d-none">
        <div class="dropdown">
          <button class="btn-navbar-icon dropdown-toggle" data-bs-toggle="dropdown" style="gap:0.4rem;font-size:0.85rem;padding:0.4rem 0.8rem;border-radius:50px">
            <div class="user-avatar-sm" id="navUserAvatar">?</div>
            <span id="navUserName" class="d-none d-md-inline"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Quiz Container -->
<div class="quiz-wrapper" style="padding-top:80px;min-height:100vh">
  <div class="container" style="max-width:780px">

    <!-- Module Info + Progress -->
    <div id="quizProgressSection" class="quiz-progress-section">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <div>
          <div id="quizModuleTitle" class="quiz-module-title"></div>
          <div id="questionCounter" class="quiz-counter"></div>
        </div>
        <div id="quizScorePreview" class="quiz-score-preview d-none"></div>
      </div>
      <div class="progress-bar-track" style="height:8px">
        <div class="progress-bar-fill" id="quizProgressBar" style="width:0%;transition:width 0.4s"></div>
      </div>
      <div id="quizProgressText" class="quiz-progress-text"></div>
    </div>

    <!-- Question Area -->
    <div id="questionArea">
      <!-- Filled by quiz.js -->
      <div class="text-center py-5">
        <div class="spinner-border" style="color:var(--google-blue)" role="status"></div>
        <p class="mt-3">Loading quiz...</p>
      </div>
    </div>

  </div>
</div>

<!-- Chatbot -->
<div id="chatbotFab" class="chatbot-fab" title="Ask the AI Assistant">
  <i class="bi bi-chat-dots-fill"></i>
</div>
<div id="chatbotPanel" class="chatbot-panel">
  <div class="chatbot-header">
    <div class="chatbot-avatar"><i class="bi bi-robot"></i></div>
    <div><div class="chatbot-name">GW Assistant</div><div class="chatbot-status">● Online</div></div>
    <button class="chatbot-close" id="chatbotClose"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="chatbot-messages" id="chatbotMessages"></div>
  <div class="chatbot-suggestions" id="chatbotSuggestions"></div>
  <div class="chatbot-input-bar">
    <input type="text" id="chatbotInput" placeholder="Ask about Quiz topics..." autocomplete="off">
    <button id="chatbotSend"><i class="bi bi-send-fill"></i></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/progress.js"></script>
<script src="js/main.js"></script>
<script src="js/quiz.js"></script>
<script src="js/chatbot.js"></script>
</body>
</html>
